<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notas Fiscais</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #1a1a1a; }
    .info { color: #555; }
    .erro {
      color: #c0392b;
      background: #fdecea;
      padding: 0.75rem 1rem;
      border-radius: 6px;
    }
    .grid { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .empresa { font-weight: 600; font-size: 1rem; color: #333; }
    .preco { font-weight: 700; font-size: 1.1rem; color: #2e7d32; }
    .descricao { color: #555; margin: 0 0 0.75rem; }
    .card-footer { display: flex; gap: 1.5rem; font-size: 0.85rem; color: #777; }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    form input {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
    }
    form button {
      grid-column: 1 / -1;
      padding: 0.6rem;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    form button:hover { background: #1b5e20; }

    .file-panel {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .file-panel input[type="file"] { display: none; }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      color: #888;
      font-size: 0.95rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #2e7d32;
      background: #f0f7f0;
      color: #2e7d32;
    }
    .drop-zone.has-file {
      border-color: #2e7d32;
      background: #f0f7f0;
    }
    .drop-zone svg { display: block; margin: 0 auto 0.5rem; }
    .file-preview {
      display: none;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .file-preview.visible { display: block; }
    .file-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      background: #f0f7f0;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.85rem;
      color: #2e7d32;
      font-weight: 600;
    }
    .file-preview-header button {
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .file-preview-header button:hover { color: #c0392b; }
    .file-preview img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      background: #eee;
      padding: 0.5rem;
    }
    .file-panel-actions { display: flex; gap: 0.75rem; }
    .file-panel button#file-btn {
      padding: 0.55rem 1.25rem;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .file-panel button#file-btn:hover { background: #1b5e20; }
    .file-panel button#file-btn:disabled { background: #aaa; cursor: default; }

    .preview-loading {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      color: #555;
      font-size: 0.9rem;
    }
    .preview-loading.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #ccc;
      border-top-color: #2e7d32;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .extract-result {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      border-top: 1px solid #e0e0e0;
      padding-top: 0.75rem;
    }
    .extract-result.visible { display: flex; }
    .extract-result dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 0.75rem;
      font-size: 0.9rem;
    }
    .extract-result dt { color: #888; }
    .extract-result dd { color: #1a1a1a; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Notas Fiscais</h1>

    <div style="margin-bottom:1.5rem">
      <div class="file-panel">
        <input type="file" id="file-input" accept="image/*" />
        <div class="drop-zone" id="drop-zone">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span id="drop-label">Clique ou arraste uma <strong>imagem</strong></span>
        </div>
        <div class="file-preview" id="file-preview">
          <div class="file-preview-header">
            <span id="preview-filename"></span>
            <button id="clear-file" title="Remover arquivo">&#x2715;</button>
          </div>
          <img id="preview-content" src="" alt="preview" />
        </div>
        <div class="preview-loading" id="preview-loading">
          <div class="spinner"></div>
          <span>Extraindo dados da nota...</span>
        </div>
        <div class="extract-result" id="extract-result">
          <dl id="extract-dl"></dl>
        </div>
        <div class="file-panel-actions">
          <button id="file-btn" disabled>Importar</button>
        </div>
      </div>
    </div>

    <div id="status"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="integrations.js"></script>
  <script src="view.js"></script>
</body>
</html>
